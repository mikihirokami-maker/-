<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK Real-AI Architect</title>
    <style>
        :root { --main-color: #ff0055; --bg-dark: #0a0a0a; --panel-bg: #141414; --text-main: #f0f0f0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 15px 20px; border-bottom: 2px solid var(--main-color); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* APIキー設定画面 */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        .setup-box { background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #333; max-width: 400px; width: 100%; text-align: center; }
        .setup-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        
        /* チャット画面 */
        #chat-interface { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 90%; padding: 15px 20px; border-radius: 10px; line-height: 1.6; font-size: 0.95rem; }
        .ai-msg { background: var(--panel-bg); border-left: 3px solid var(--main-color); align-self: flex-start; }
        .user-msg { background: #222; border-right: 3px solid #777; align-self: flex-end; }
        
        .input-area { background: #000; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input[type="text"] { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        input[type="text"]:focus { border-color: var(--main-color); }
        button { background: var(--main-color); color: #fff; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.8; }
        .loading { font-style: italic; color: #888; }
    </style>
</head>
<body>

<header>
    <span>🏗️ ARK リアルAI 建築コンサルタント</span>
    <button onclick="resetKey()" style="padding: 5px 10px; font-size: 0.8rem; background: #333;">設定リセット</button>
</header>

<div id="setup-screen">
    <div class="setup-box">
        <h2 style="color: #ff0055; margin-top: 0;">AIエンジン接続設定</h2>
        <p style="font-size: 0.9rem; color: #aaa;">本物のAIを動かすには、Googleの無料APIキーが必要です。</p>
        <input type="password" id="apiKeyInput" placeholder="APIキーを貼り付けてください">
        <button onclick="saveKey()" style="width: 100%; padding: 15px;">接続を開始する</button>
    </div>
</div>

<div id="chat-interface"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="例：レッドウッドに巨大なツリーハウスを作りたい。手順と注意点は？" onkeypress="if(event.keyCode==13) sendMessage()">
    <button onclick="sendMessage()">送信</button>
</div>

<script>
    // APIキーの保存と読み込み
    let apiKey = localStorage.getItem('gemini_api_key');
    if (apiKey) {
        document.getElementById('setup-screen').style.display = 'none';
        appendMsg('System', 'AIエンジンへの接続が完了しました。ARKの建築について、どんなマニアックなことでも質問してください。毎回リアルタイムで考えて回答します。', 'ai');
    }

    function saveKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            localStorage.setItem('gemini_api_key', key);
            apiKey = key;
            document.getElementById('setup-screen').style.display = 'none';
            appendMsg('System', '接続に成功しました。建築プランをどうぞ！', 'ai');
        }
    }

    function resetKey() {
        localStorage.removeItem('gemini_api_key');
        location.reload();
    }

    const chatBox = document.getElementById('chat-interface');
    const inputField = document.getElementById('userInput');

    // 過去の会話を記憶する配列（AIの文脈理解用）
    let conversationHistory = [];

    function appendMsg(sender, text, type, id = null) {
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        if (id) div.id = id;
        // AIのマークダウン（**太字**など）を簡易的にHTML変換
        let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong><span style="color:#ff0055;">$1</span></strong>');
        formattedText = formattedText.replace(/\n/g, '<br>');
        div.innerHTML = formattedText;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text || !apiKey) return;

        appendMsg('You', text, 'user');
        inputField.value = "";
        
        const loadingId = 'loading-' + Date.now();
        appendMsg('System', 'AIが独自に設計図を構築中...', 'ai', loadingId);

        // AIへの命令（プロンプト）を作成
        const systemInstruction = `あなたはゲーム「ARK: Survival Evolved」の超プロフェッショナルな建築家です。
        テンプレートや定型文は絶対に一切使わず、毎回完全にオリジナルの言葉で、マニアックで具体的な建築のやり方（土台下げ、スナップポイントの活用、柱の隠し方など）を解説してください。
        ユーザーの要望に合わせて、実践的なステップと、必要建材の概算を算出してください。`;

        // 過去の会話と今回の質問を合体
        let promptText = systemInstruction + "\n\n";
        conversationHistory.forEach(h => {
            promptText += `ユーザー: ${h.user}\n建築家: ${h.ai}\n\n`;
        });
        promptText += `ユーザー: ${text}\n建築家:`;

        try {
            // Google Gemini API（本物のAI）へリクエストを送信！
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (data.error) {
                appendMsg('Error', `エラーが発生しました: ${data.error.message}`, 'ai');
                return;
            }

            const aiResponse = data.candidates[0].content.parts[0].text;
            appendMsg('Architect', aiResponse, 'ai');

            // 会話履歴を保存（最大3往復まで記憶）
            conversationHistory.push({ user: text, ai: aiResponse });
            if (conversationHistory.length > 3) conversationHistory.shift();

        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMsg('Error', '通信に失敗しました。インターネット接続かAPIキーを確認してください。', 'ai');
        }
    }
</script>
</body>
</html>
