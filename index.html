<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARK Real-AI Architect</title>
    <style>
        :root { --main-color: #ff0055; --bg-dark: #0a0a0a; --panel-bg: #141414; --text-main: #f0f0f0; }
        
        /* スマホ特有のタップ時の変なハイライトを消す */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* height: 100dvh でスマホのアドレスバーの伸び縮みに完璧に対応 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        header { background: #000; padding: 15px; border-bottom: 2px solid var(--main-color); font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; font-size: 1rem; }
        header button { padding: 8px 12px; font-size: 0.75rem; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; }

        /* APIキー設定画面 */
        #setup-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .setup-box { background: #1a1a1a; padding: 25px 20px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .setup-box h2 { font-size: 1.3rem; color: var(--main-color); margin-top: 0; }
        /* iOSのズーム防止のため font-size: 16px 必須 */
        .setup-box input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; }
        .setup-box button { width: 100%; padding: 15px; background: var(--main-color); color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }

        /* チャット画面 */
        #chat-interface { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .ai-msg { background: var(--panel-bg); border-left: 4px solid var(--main-color); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: #2a2a2a; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        /* 入力エリア（iPhoneの下部バーにも被らないよう padding-bottom 調整） */
        .input-area { background: #000; padding: 10px 15px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); display: flex; gap: 10px; border-top: 1px solid #222; flex-shrink: 0; align-items: center; }
        /* iOSズーム防止 font-size: 16px */
        input[type="text"] { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid #333; background: #111; color: white; outline: none; font-size: 16px; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--main-color); }
        
        /* 送信ボタンを親指で押しやすい丸型に */
        .send-btn { background: var(--main-color); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; font-size: 0.9rem; transition: 0.1s; }
        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled { background: #555; cursor: not-allowed; transform: none; }
        
        .loading { font-style: italic; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <span>🏗️ リアルAI 建築士</span>
    <button onclick="resetKey()">リセット</button>
</header>

<div id="setup-screen">
    <div class="setup-box">
        <h2>AIエンジン接続設定</h2>
        <p style="font-size: 0.85rem; color: #aaa;">本物のAIを動かすには、Googleの無料APIキーが必要です。</p>
        <input type="password" id="apiKeyInput" placeholder="APIキーを貼り付け">
        <button onclick="saveKey()">接続を開始する</button>
    </div>
</div>

<div id="chat-interface"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="聞きたいことを入力..." onkeypress="if(event.keyCode==13) sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">送信</button>
</div>

<script>
    let apiKey = localStorage.getItem('gemini_api_key');
    if (apiKey) {
        document.getElementById('setup-screen').style.display = 'none';
        appendMsg('System', '接続完了。ARKの建築について、どんなマニアックなことでも質問してください。', 'ai');
    }

    function saveKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            localStorage.setItem('gemini_api_key', key);
            apiKey = key;
            document.getElementById('setup-screen').style.display = 'none';
            appendMsg('System', '接続に成功しました。建築プランをどうぞ！', 'ai');
        }
    }

    function resetKey() {
        localStorage.removeItem('gemini_api_key');
        location.reload();
    }

    const chatBox = document.getElementById('chat-interface');
    const inputField = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let conversationHistory = [];

    function appendMsg(sender, text, type, id = null) {
        const div = document.createElement('div');
        div.className = `msg ${type}-msg`;
        if (id) div.id = id;
        
        let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong><span style="color:#ff0055;">$1</span></strong>');
        formattedText = formattedText.replace(/\n/g, '<br>');
        div.innerHTML = formattedText;
        
        chatBox.appendChild(div);
        chatBox.scrollTo(0, chatBox.scrollHeight); // 確実なスクロール
    }

    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text || !apiKey) return;

        // 連打防止のため入力をロック
        inputField.disabled = true;
        sendBtn.disabled = true;

        appendMsg('You', text, 'user');
        inputField.value = "";
        
        const loadingId = 'loading-' + Date.now();
        appendMsg('System', 'AIが独自に設計図を構築中...', 'ai', loadingId);

        const systemInstruction = `あなたはゲーム「ARK: Survival Evolved」の超プロフェッショナルな建築家です。
        テンプレートや定型文は絶対に一切使わず、毎回完全にオリジナルの言葉で、マニアックで具体的な建築のやり方（土台下げ、スナップポイントの活用、柱の隠し方など）を解説してください。
        ユーザーの要望に合わせて、実践的なステップと、必要建材の概算を算出してください。`;

        let promptText = systemInstruction + "\n\n";
        conversationHistory.forEach(h => {
            promptText += `ユーザー: ${h.user}\n建築家: ${h.ai}\n\n`;
        });
        promptText += `ユーザー: ${text}\n建築家:`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (data.error) {
                appendMsg('Error', `エラーが発生しました: ${data.error.message}`, 'ai');
            } else {
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMsg('Architect', aiResponse, 'ai');
                conversationHistory.push({ user: text, ai: aiResponse });
                if (conversationHistory.length > 3) conversationHistory.shift();
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMsg('Error', '通信に失敗しました。', 'ai');
        } finally {
            // ロック解除して入力欄にフォーカスを戻す
            inputField.disabled = false;
            sendBtn.disabled = false;
            // inputField.focus(); // スマホだと勝手にキーボードが出るのが鬱陶しい場合があるのでコメントアウト
            chatBox.scrollTo(0, chatBox.scrollHeight);
        }
    }
</script>
</body>
</html>
